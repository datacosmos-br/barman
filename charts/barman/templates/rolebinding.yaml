{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "barman.fullname" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "barman.fullname" . }}-backup
subjects:
{{- range .Values.barman.backups }}
- kind: ServiceAccount
  name: {{ .serviceaccount }}
  namespace: {{ .namespace }}
{{- end }}
{{- end }}
