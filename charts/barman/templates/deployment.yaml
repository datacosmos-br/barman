apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "barman.fullname" . }}
  labels:
    {{- include "barman.labels" . | nindent 4 }}
  {{- with .Values.deployment.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "barman.selectorLabels" . | nindent 6 }}
  strategy:
    type: {{ .Values.deployment.strategy.type | quote }}
  template:
    metadata:
      {{- with .Values.deployment.podAnnotations }}
      annotations: {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "barman.labels" . | nindent 8 }}
    spec:
    {{- with .Values.deployment.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
    {{- end }}
      containers:
        {{- with .Values.deployment.extraContainers }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        - name: barman
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # workaround for https://github.com/ubc/barman-docker/pull/4
          command: ["tini", "--", "/entrypoint.sh"]
          args: ["cron", "-L", "4", "-f"]
          {{- if .Values.prometheus.enabled }}
          ports:
            - name: prom-exporter
              containerPort: {{ .Values.prometheus.service.internalPort }}
              protocol: TCP
          {{- end }}
          {{/*
          Fix permissions & owner of .pgpass file
          https://www.postgresql.org/docs/9.4/libpq-pgpass.html
          */}}
          lifecycle:
            postStart:
              exec:
                command:
                  - "/bin/sh"
                  - "-c"
                  - "HOME=/home/barman && cp /.pgpass $HOME/ && chown barman:barman $HOME/.pgpass && chmod 600 $HOME/.pgpass"
          envFrom:
            - configMapRef:
                name: {{ include "barman.fullname" . }}-config
          {{- if .Values.healthCheck.enabled }}
          env:
            - name: HC_IGNORE_CHECKS
              value: {{ .Values.healthCheck.ignoreChecks | quote }}
          {{- end }}
          volumeMounts:
            - mountPath: /var/lib/barman
              name: data
              subPath: data
            - mountPath: /var/lib/barman/recover
              name: recover
              subPath: recover
            {{- if .Values.persistence.basebackups.enabled }}
            - mountPath: {{ .Values.persistence.basebackups.mountPath }}
              name: basebackups
            {{- end }}
            - mountPath: /etc/barman/barman.d
              name: barman-backups-config
            - mountPath: /etc/barman.conf
              name: barman-global-config
              subPath: barman.conf
            - mountPath: /.pgpass
              name: barman-pgpass-secret
              subPath: .pgpass
            - mountPath: /etc/cron.d/barman
              name: barman-cron-config
              subPath: barman
            - mountPath: /entrypoint.sh
              name: barman-entrypoint
              subPath: entrypoint.sh
          {{- if .Values.healthCheck.enabled }}
            - mountPath: /scripts/healthcheck.sh
              name: barman-healthcheck
              subPath: healthcheck.sh
          {{- end }}
          {{- if .Values.ssh.enabled }}
            - mountPath: /ssh-keys
              name: ssh-keys
              readOnly: true
          {{- end }}
          {{- with .Values.deployment.additionalVolumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end  }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.healthCheck.enabled }}
          # startupProbe: espera o barman inicializar (servidores carregados).
          startupProbe:
            exec:
              command: ["/bin/bash", "-c", "barman list-server --minimal | grep -q ."]
            initialDelaySeconds: {{ .Values.healthCheck.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.startupProbe.periodSeconds }}
            failureThreshold: {{ .Values.healthCheck.startupProbe.failureThreshold }}
          # readinessProbe: roda o health check; FALHA (pod NotReady ->
          # Deployment/ArgoCD degradado) se algum banco/replicacao/backup
          # agendado estiver quebrado.
          readinessProbe:
            exec:
              command: ["/bin/bash", "-c", "su barman -c 'bash /scripts/healthcheck.sh'"]
            initialDelaySeconds: {{ .Values.healthCheck.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.readinessProbe.failureThreshold }}
          {{- end }}
{{- if or .Values.deployment.initContainers .Values.dbPreflight.enabled }}
      initContainers:
        {{- if .Values.dbPreflight.enabled }}
        # Pré-flight: valida os parâmetros dos PostgreSQL alvo antes de subir.
        - name: db-preflight
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/bash", "/scripts/db-preflight.sh"]
          env:
            - name: DB_PREFLIGHT_MODE
              value: {{ .Values.dbPreflight.mode | quote }}
            - name: DB_PREFLIGHT_MIN_WAL_SENDERS
              value: {{ .Values.dbPreflight.minWalSenders | quote }}
            - name: DB_PREFLIGHT_MIN_REPL_SLOTS
              value: {{ .Values.dbPreflight.minReplicationSlots | quote }}
          volumeMounts:
            - mountPath: /scripts/db-preflight.sh
              name: barman-db-preflight
              subPath: db-preflight.sh
            - mountPath: /.pgpass
              name: barman-pgpass-secret
              subPath: .pgpass
        {{- end }}
        {{- if .Values.deployment.initContainers }}
        {{- if eq (typeOf .Values.deployment.initContainers) "string" }}
        {{- tpl .Values.deployment.initContainers . | nindent 8 }}
        {{- else }}
        {{- toYaml .Values.deployment.initContainers | nindent 8 }}
        {{- end }}
        {{- end }}
      {{- end }}
      volumes:
        - name: data
        {{- if not .Values.persistence.data.enabled }}
          emptyDir: {}
        {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "barman.fullname" . }}-data
        {{- end }}
        - name: recover
        {{- if not .Values.persistence.recover.enabled }}
          emptyDir: {}
        {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "barman.fullname" . }}-recover
        {{- end }}
        {{- if .Values.persistence.basebackups.enabled }}
        - name: basebackups
          persistentVolumeClaim:
            claimName: {{ include "barman.fullname" . }}-basebackups
        {{- end }}
        - name: barman-backups-config
          configMap:
            name: {{ include "barman.fullname" . }}-backups-config
        - name: barman-global-config
          configMap:
            name: {{ include "barman.fullname" . }}-global-config
        - name: barman-pgpass-secret
          secret:
            secretName: {{ include "barman.pgpassSecretName" . }}
            defaultMode: 0600
        - name: barman-cron-config
          configMap:
            name: {{ include "barman.fullname" . }}-cron-config
        {{- if .Values.dbPreflight.enabled }}
        - name: barman-db-preflight
          configMap:
            name: {{ include "barman.fullname" . }}-db-preflight
            defaultMode: 0775
        {{- end }}
        - name: barman-entrypoint
          configMap:
            name: {{ include "barman.fullname" . }}-entrypoint
            defaultMode: 0775
        {{- if .Values.healthCheck.enabled }}
        - name: barman-healthcheck
          configMap:
            name: {{ include "barman.fullname" . }}-healthcheck
            defaultMode: 0775
        {{- end }}
        {{- if .Values.ssh.enabled }}
        - name: ssh-keys
          secret:
            secretName: {{ include "barman.sshSecretName" . }}
            defaultMode: 0600
        {{- end }}
      {{- with .Values.deployment.additionalVolumes }}
        {{- toYaml . | nindent 8 }}
      {{- end  }}
    {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
    {{- end }}
