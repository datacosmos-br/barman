apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ template "barman.fullname" . }}-backups-config
  labels:
    {{- include "barman.labels" . | nindent 4 }}
data:
  {{- range .Values.barman.backups }}
  {{ .scopeName }}.conf: |
      [{{ .scopeName }}]
      active = true
      description = "{{ .description | default .scopeName }}"
      conninfo = host={{ .postgresql.host }} port={{ .postgresql.port }} user={{ .postgresql.superUser }} dbname={{ .postgresql.superUserDatabase }}
      streaming_conninfo = host={{ .postgresql.host }} port={{ .postgresql.port }} user={{ .postgresql.replicationUser }}
      {{- if .databaseSlotName }}
      slot_name = {{ .databaseSlotName }}
      {{- end }}
      {{- if hasKey . "createDatabaseSlot" }}
      create_slot = {{ if .createDatabaseSlot }}auto{{ else }}manual{{ end }}
      {{- end }}
      ; per-server options (backups[].configuration) — override the global ones
      {{- range $key, $val := .configuration }}
      {{ $key }} = {{ $val }}
      {{- end }}
      {{- if .additionalConfiguration }}
      {{- .additionalConfiguration | nindent 6 }}
      {{- end }}
  {{- end }}
