image:
  # -- Container image to deploy (Barman 3.x including the barman-cloud-* tools)
  repository: ghcr.io/datacosmos-br/barman
  # -- When to pull the container image
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion
  tag: ""

# -- Resource limits and requests for the Barman container
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 512Mi

# -- nodeSelector for the Barman pod
nodeSelector: {}

deployment:
  strategy:
    # -- Strategy used to replace old Pods (use Recreate with RWO volumes)
    type: Recreate
  # -- Additional VolumeMounts for the Barman container
  additionalVolumeMounts: []
  # -- Additional Volumes for the deployment
  additionalVolumes: []
  # -- Deployment annotations
  annotations: {}
  # -- Pod annotations
  podAnnotations: {}
  # -- Extra sidecar containers
  extraContainers: {}
  # -- imagePullSecrets for the deployment
  imagePullSecrets: []
  # -- Additional environment variables for the Barman container (map).
  # Use for barman-cloud credentials (AWS_ACCESS_KEY_ID, ...) or any tuning.
  additionalENVs: {}
  # -- Init containers. A string value is rendered as a template.
  initContainers: []

service:
  # -- Whether to create a Service for the Barman pod
  create: false
  # -- Service type
  type: ClusterIP
  # -- Service annotations
  annotations: {}
  ports:
    - targetPort: http
      protocol: TCP
      name: http
      port: 80
  # -- clusterIP (ClusterIP type only)
  clusterIP: ~
  # -- loadBalancerIP (LoadBalancer type only)
  loadBalancerIP: ~

persistence:
  data:
    # -- Enable a PVC for the backup catalog (base backups + WAL)
    enabled: true
    # -- Access mode
    accessMode: ReadWriteOnce
    # -- Volume size — size for the retention window of all servers
    size: 50Gi
    # -- StorageClass ("" = cluster default)
    storageClass: ""
    # -- Annotations for the data PVC
    annotations: {}
  recover:
    # -- Enable a PVC used as scratch space for restores
    enabled: false
    # -- Access mode
    accessMode: ReadWriteOnce
    # -- Volume size
    size: 10Gi
    # -- StorageClass ("" = cluster default)
    storageClass: ""
    # -- Annotations for the recover PVC
    annotations: {}

rbac:
  # -- Create a ClusterRole/Binding (only needed for in-cluster integrations
  # that exec into PostgreSQL pods). Leave false for external databases.
  create: false

secret:
  # -- Manage the generated .pgpass Secret from barman.backups[].postgresql
  create: true

# ===========================================================================
# SSH — required for `backup_method: rsync` (rsync over SSH) and for repmgr
# clone-via-barman. When enabled, an SSH keypair is mounted into the Barman
# pod and the entrypoint installs it at ~barman/.ssh/. NOT needed for
# `backup_method: postgres` (pg_basebackup). See README "Backup methods".
# ===========================================================================
ssh:
  # -- Enable SSH key mounting (required for backup_method: rsync)
  enabled: false
  # -- Name of an existing Secret holding the keys: id_rsa, id_rsa.pub,
  # known_hosts. Recommended — provide it via a secrets manager / ESO.
  existingSecret: ""
  # -- Inline key material. Use ONLY for local tests — never commit a real
  # private key. Rendered into a chart-managed Secret when secret.create=true.
  secret:
    create: false
    # -- SSH private key (id_rsa)
    privateKey: ""
    # -- SSH public key (id_rsa.pub)
    publicKey: ""
    # -- known_hosts entries for the PostgreSQL hosts
    knownHosts: ""

# ===========================================================================
# Health check — a readinessProbe runs `barman check` for every server and
# makes the pod NotReady (Deployment + ArgoCD show degraded/unhealthy) when
# the backup is NOT healthy: a database is unreachable, replication/streaming
# is broken, or a scheduled backup has failed. Fully parameterizable.
# ===========================================================================
healthCheck:
  # -- Enable the health check (readinessProbe + startupProbe)
  enabled: true
  # -- `barman check` lines to IGNORE (extended regex). By default ignores
  # "minimum redundancy" and "backup maximum age" — both fail before the
  # first backup exists and are not a real failure. The check still fails on
  # connection, streaming/replication, replication slot, WAL archive and
  # "failed backups" (a scheduled backup that actually failed).
  # To require at least one healthy backup, set: ignoreChecks: ""
  ignoreChecks: "minimum redundancy requirements|backup maximum age"
  # -- startupProbe: waits until barman has loaded its servers
  startupProbe:
    initialDelaySeconds: 20
    periodSeconds: 10
    failureThreshold: 30
  # -- readinessProbe: runs the health check on a schedule
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 60
    timeoutSeconds: 30
    failureThreshold: 2

# ===========================================================================
# Barman configuration. Every Barman capability is parameterizable here:
#  - barman.globalConfiguration : the [barman] section (global defaults)
#  - barman.backups[].configuration : per-server overrides ([<scope>] section)
#  - barman.backups[].additionalConfiguration : raw extra lines per server
# Any valid Barman option may be used as a key — see https://docs.pgbarman.org/
# ===========================================================================
barman:
  # -- Barman home directory (BARMAN_DATA_DIR)
  backupDir: /var/lib/barman
  # -- OS user Barman runs as
  barmanUser: barman
  # -- Cron expression for `barman cron` (keeps WAL streaming alive)
  cronSchedule: "* * * * *"
  # -- Default base-backup cron expression (a server may override it)
  backupSchedule: "0 4 * * *"

  # -- Global [barman] options. Rendered verbatim as `key = value`.
  # Defaults enable Barman's streaming/continuous capabilities; override or
  # add any option (compression, retention, parallelism, hooks, ...).
  globalConfiguration:
    backup_method: postgres
    backup_options: concurrent_backup
    compression: gzip
    retention_policy: "RECOVERY WINDOW of 1 MONTH"
    retention_policy_mode: auto
    wal_retention_policy: main
    minimum_redundancy: 1
    last_backup_maximum_age: "1 day"
    streaming_archiver: "on"
    archiver: "off"
    create_slot: auto
    parallel_jobs: 1
    network_compression: false
    reuse_backup: "off"
    basebackup_retry_times: 3
    basebackup_retry_sleep: 30
    immediate_checkpoint: false
    check_timeout: 30
    log_level: INFO

  # -- Global hook scripts (optional). Any Barman *_script / *_retry_script key.
  hookScripts: {}
    # post_backup_retry_script: "/etc/barman/hooks/upload-to-cloud.sh"
    # pre_recovery_retry_script: ""

  # -- List of PostgreSQL servers to back up. Each entry is an independent
  # Barman server (scope) — add as many as needed to back up multiple
  # databases simultaneously. `postgresql.host` may be a Kubernetes Service
  # (in-cluster) OR any reachable host/FQDN/IP (external PostgreSQL).
  backups:
      # ---- Example 1: PostgreSQL running INSIDE the Kubernetes cluster ----
    - # -- Unique scope / Barman server id
      scopeName: "pg-in-cluster"
      # -- Human-readable description
      description: "In-cluster PostgreSQL (streaming)"
      # -- Base-backup cron for this server (omit to use barman.backupSchedule)
      backupSchedule: "0 2 * * *"
      # -- Physical replication slot name (unique per server)
      databaseSlotName: "barman_pg_in_cluster"
      # -- Create the replication slot automatically
      createDatabaseSlot: true
      postgresql:
        # -- Host — Kubernetes Service FQDN for in-cluster databases
        host: "postgresql.default.svc.cluster.local"
        # -- Port
        port: 5432
        # -- Superuser (base-backup connection)
        superUser: postgres
        # -- Superuser password — OVERRIDE per environment, never commit secrets
        superUserPassword: "changeme"
        # -- Superuser database
        superUserDatabase: postgres
        # -- Replication user (WAL streaming)
        replicationUser: "streaming_barman"
        # -- Replication password — OVERRIDE per environment
        replicationPassword: "changeme"
      # -- Per-server [<scope>] options — overrides globalConfiguration
      configuration:
        retention_policy: "RECOVERY WINDOW of 1 MONTH"
        last_backup_maximum_age: "1 day"
      # -- Raw extra lines appended to this server's config block
      additionalConfiguration: ""
      # -- Namespace of the PostgreSQL workload (only used when rbac.create=true)
      namespace: default
      # -- ServiceAccount of the PostgreSQL workload (only used when rbac.create=true)
      serviceaccount: default

      # ---- Example 2: PostgreSQL running OUTSIDE the Kubernetes cluster ----
    - scopeName: "pg-external"
      description: "External PostgreSQL (streaming)"
      backupSchedule: "0 3 * * *"
      databaseSlotName: "barman_pg_external"
      createDatabaseSlot: true
      postgresql:
        # -- For external databases use the reachable host/FQDN or IP
        host: "postgres.example.com"
        port: 5432
        superUser: postgres
        superUserPassword: "changeme"
        superUserDatabase: postgres
        replicationUser: "streaming_barman"
        replicationPassword: "changeme"
      configuration:
        retention_policy: "RECOVERY WINDOW of 2 WEEKS"
        last_backup_maximum_age: "1 day"
      additionalConfiguration: ""
      # namespace/serviceaccount are irrelevant for external databases
      namespace: ""
      serviceaccount: ""

prometheus:
  # -- Enable the Barman Prometheus exporter integration
  enabled: true
  service:
    # -- Exporter service name
    name: barman-exporter
    # -- Exporter internal port
    internalPort: 9780
    # -- Exporter external port
    externalPort: 9780
    # -- Exporter service type
    type: ClusterIP
  serviceMonitor:
    # -- Extra labels for the ServiceMonitor
    extraLabels: {}
    # -- Scrape interval
    interval: "30s"
    # -- metricRelabelings
    metricRelabelings: []
    # -- relabelings
    relabelings: []
  rules:
    # -- Enable Alertmanager (PrometheusRule) objects
    enabled: false
    # -- Selector labels for the rules
    selector: []
    # -- Additional labels for the rules
    additionalLabels: []
    # -- Array of alerting rules
    spec: []
